name: Build LaTeX PDFs

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - 'figs/**'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Master Reference Document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: megn300_master_reference.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          extra_packages: tcolorbox etoolbox pgf environ tikzfill pdfcol

      - name: Build Student Guide
        if: hashFiles('MEGN300_Student_Guide.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: MEGN300_Student_Guide.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          extra_packages: tcolorbox etoolbox pgf environ tikzfill pdfcol

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f megn300_master_reference.pdf
          if [ -f MEGN300_Student_Guide.pdf ]; then
            git add -f MEGN300_Student_Guide.pdf
          fi
          git diff --staged --quiet || {
            git commit -m "Auto-build PDFs [skip ci]"
            git pull --rebase origin main
            git push
          }
